name: Build, Test and Deploy React Application

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (Jest)
        run: npm run test:unit

      - name: Run unit + integration tests (Vitest)
        run: npm test

      - name: build and publish package on NPM
        run: |
          git config --global user.email "enzo.keil@ynov.com"
          git config --global user.name "enzoooooo"
          
          # Forcer l'authentification
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          
          npm run build-npm-ci
          
          # Comparer les versions
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view @enzoooooo/ci-cd-project version 2>/dev/null || echo "0.0.0")
          
          echo "Version locale : $LOCAL_VERSION"
          echo "Version NPM : $NPM_VERSION"
          
          # Si la version locale est inférieure ou égale à celle sur NPM, on patche
          if [ "$(printf '%s\n' "$NPM_VERSION" "$LOCAL_VERSION" | sort -V | head -n1)" = "$LOCAL_VERSION" ]; then
            echo "Mise à jour de la version..."
            npm version patch
            npm publish --access public
            git push --follow-tags
          else
            echo "La version locale est déjà supérieure, publication..."
            npm publish --access public
            git push --follow-tags
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build Web Application
        run: |
          npm run build

      - name: Generate Documentation
        run: |
          npm run docs
          mv docs dist/docs

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build_test
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
