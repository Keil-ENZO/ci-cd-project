name: Docker Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend -f DockerfileReact .
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend -f server/Dockerfile ./server
          docker push ${{ secrets.DOCKER_USERNAME }}/backend

  test-docker:
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from secrets
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=ynov_ci"                                  >> .env
          echo "MYSQL_USER=root"                                          >> .env
          echo "MYSQL_HOST=db"                                            >> .env
          echo "VITE_SERVER_PORT=8000"                                    >> .env

      - name: Build migration MySQL image
        run: docker build -t migration_mysql .

      - name: Start all services
        run: docker compose up -d

      - name: Show running containers
        run: docker ps

      - name: Wait for services to be healthy (90s)
        run: sleep 90

      - name: Check db health
        run: |
          docker inspect --format "{{json .State.Health.Status }}" ci-cd-project-db-1 \
            | jq -e '. == "healthy"'

      - name: Check server health
        run: |
          docker inspect --format "{{json .State.Health.Status }}" ci-cd-project-server-1 \
            | jq -e '. == "healthy"'

      - name: Check adminer health
        run: |
          docker inspect --format "{{json .State.Health.Status }}" ci-cd-project-adminer-1 \
            | jq -e '. == "healthy"'

      - name: Check frontend health
        run: |
          docker inspect --format "{{json .State.Health.Status }}" ci-cd-project-frontend-1 \
            | jq -e '. == "healthy"'
