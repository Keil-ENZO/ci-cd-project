name: Docker Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend -f DockerfileReact .
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend -f server/Dockerfile ./server
          docker push ${{ secrets.DOCKER_USERNAME }}/backend

  test-docker:
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from secrets
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=ynov_ci"                                  >> .env
          echo "MYSQL_USER=root"                                          >> .env
          echo "MYSQL_HOST=db"                                            >> .env
          echo "VITE_SERVER_PORT=8000"                                    >> .env
          echo "ADMIN_EMAIL=loise.fenoll@ynov.com"                        >> .env
          echo "ADMIN_PASSWORD=PvdrTAzTeR247sDnAZBr"                       >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET || 'ci-test-secret' }}" >> .env

      - name: Build migration MySQL image
        run: docker build -t migration_mysql .

      - name: Start all services
        run: docker compose up -d

      - name: Show running containers
        run: docker ps

      - name: Wait for services to be healthy (90s)
        run: sleep 90

      - name: Check db health
        run: |
          docker inspect --format "{{json .State.Health.Status }}" ci-cd-project-db-1 \
            | jq -e '. == "healthy"'

      - name: Check server health
        run: |
          docker inspect --format "{{json .State.Health.Status }}" ci-cd-project-server-1 \
            | jq -e '. == "healthy"'

      - name: Check adminer health
        run: |
          docker inspect --format "{{json .State.Health.Status }}" ci-cd-project-adminer-1 \
            | jq -e '. == "healthy"'

      - name: Check frontend health
        run: |
          docker inspect --format "{{json .State.Health.Status }}" ci-cd-project-frontend-1 \
            | jq -e '. == "healthy"'

  e2e:
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Create .env file from secrets
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=ynov_ci"                                  >> .env
          echo "MYSQL_USER=root"                                          >> .env
          echo "MYSQL_HOST=db"                                            >> .env
          echo "VITE_SERVER_PORT=8000"                                    >> .env
          echo "ADMIN_EMAIL=loise.fenoll@ynov.com"                        >> .env
          echo "ADMIN_PASSWORD=PvdrTAzTeR247sDnAZBr"                       >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET || 'ci-test-secret' }}" >> .env

      - name: Build migration MySQL image
        run: docker build -t migration_mysql .

      - name: Start all services
        run: docker compose up -d

      - name: Wait for services to be healthy (90s)
        run: sleep 90

      - name: Show running containers
        run: docker ps

      - name: Install dependencies
        run: npm ci

      - name: Run End-to-End tests (Cypress)
        run: npx cypress run --e2e

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs
