# Généré par Ansible (template). Les images sont tirées du registre privé.
services:

  db:
    image: {{ registry_host }}:443/migration_mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD={{ mysql_root_password }}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    image: {{ registry_host }}:443/backend
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD={{ mysql_root_password }}
      - MYSQL_DATABASE={{ mysql_database }}
      - MYSQL_USER={{ mysql_user }}
      - MYSQL_HOST={{ mysql_host }}
      - ADMIN_EMAIL={{ admin_email }}
      - ADMIN_PASSWORD={{ admin_password }}
      - JWT_SECRET={{ jwt_secret }}
    ports:
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/users"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    depends_on:
      server:
        condition: service_healthy

  frontend:
    image: {{ registry_host }}:443/frontend
    restart: always
    environment:
      - VITE_SERVER_PORT={{ vite_server_port }}
    ports:
      - 3000:5173
    depends_on:
      server:
        condition: service_healthy
    command: npm run dev

volumes:
  db-data:
