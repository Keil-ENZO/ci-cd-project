# Fichier généré par Ansible (template). Ne pas éditer à la main sur le serveur.
events {}

http {
    # Conteneurs internes (communication via le réseau Docker Compose)
    upstream docker-registry {
        server registry:5000;
    }
    upstream docker-ui {
        server ui:80;
    }

    # Désactive la limite de taille (push d'images volumineuses)
    client_max_body_size 0;
    chunked_transfer_encoding on;

    server {
        listen 443 ssl;
        server_name {{ public_ip }};

        # Certificat auto-signé monté depuis ./certs
        ssl_certificate     /etc/nginx/certs/registry.crt;
        ssl_certificate_key /etc/nginx/certs/registry.key;

        # Routage intelligent : l'API Docker Registry
        location /v2/ {
            proxy_pass                          http://docker-registry;
            proxy_set_header  Host              $http_host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
            proxy_read_timeout                  900;
        }

        # Tout le reste : l'interface web
        location / {
            proxy_pass                          http://docker-ui;
            proxy_set_header  Host              $http_host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }
    }
}
